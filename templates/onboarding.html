{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>初期設定（あなたの情報）</h2>
  <p class="muted">入力した情報から、1日の目標カロリーとPFC（タンパク質・脂質・炭水化物）を計算します。</p>

  {# 送信先は同じ /onboarding（POST）。計算は app.py がエンジンに依頼する。 #}
  <form method="post" action="{{ url_for('onboarding') }}">
    <label>性別</label>
    <select name="gender" required>
      <option value="male">男性</option>
      <option value="female">女性</option>
    </select>

    <label>年齢（歳）</label>
    <input type="number" name="age" min="10" max="100" step="1" value="30" required>

    <label>身長（cm）</label>
    <input type="number" name="height" min="100" max="250" step="0.1" value="170" required>

    <label>現在の体重（kg）</label>
    <input type="number" name="weight" min="20" max="300" step="0.1" value="65" required>

    <label>活動強度（1.2＝低い 〜 1.9＝高い）</label>
    <input type="number" name="activity_level" min="1.2" max="1.9" step="0.05" value="1.5" required>

    <label>目的（1日のカロリー増減）</label>
    <select name="goal_offset" required>
      <option value="-250">減量・ゆっくり（-250kcal）</option>
      <option value="-500" selected>減量・標準（-500kcal）</option>
      <option value="-750">減量・ハイペース（-750kcal）</option>
      <option value="0">維持（±0kcal）</option>
      <option value="250">増量・標準（+250kcal）</option>
      <option value="500">増量・しっかり（+500kcal）</option>
    </select>

    <label>PFC戦略</label>
    <select name="strategy" required>
      <option value="①ウェルネス">①ウェルネス（バランス重視）</option>
      <option value="②ヘルスケア">②ヘルスケア（たんぱく質しっかり）</option>
      <option value="③ダイエット特化" selected>③ダイエット特化（高P・低F）</option>
      <option value="④筋肥大・競技者">④筋肥大・競技者（P最大）</option>
    </select>

    <button type="submit">この内容で目標を計算する</button>
  </form>
</div>
{% endblock %}
